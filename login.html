<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>晚寝查寝系统 · 登录</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
  <button class="neu-btn-header icon-only" id="btnTheme" onclick="toggleTheme()" title="切换日间/夜间模式"
    style="position:fixed;top:16px;right:16px;z-index:200;">
    <i class="fas fa-moon"></i>
  </button>
  <div class="login-card">
    <div class="login-icon">
      <i class="fas fa-bed"></i>
    </div>
    <div class="login-title">晚寝查寝系统</div>
    <div class="login-subtitle">登录或注册以继续使用</div>

    <div class="input-group">
      <label class="input-label">用户名</label>
      <div class="input-wrapper">
        <i class="fas fa-user"></i>
        <input type="text" class="input-field" id="username" placeholder="请输入用户名" autocomplete="username">
      </div>
    </div>

    <div class="input-group">
      <label class="input-label">登录密码</label>
      <div class="input-wrapper">
        <i class="fas fa-lock"></i>
        <input type="password" class="input-field" id="password" placeholder="请输入密码" autocomplete="current-password">
      </div>
    </div>

    <button class="login-btn" onclick="doLogin()">
      <i class="fas fa-sign-in-alt"></i>
      <span id="loginBtnText">登录</span>
    </button>

    <div class="switch-mode">
      <span id="switchText">没有账户？</span>
      <a href="javascript:void(0)" id="switchLink" onclick="toggleMode()">注册新账户</a>
    </div>
  </div>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
