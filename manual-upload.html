        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #EAF0E2;
            font-size: 14px;
            line-height: 1.5;
            padding-bottom: 120px;
            color: #1a1a2e;
            letter-spacing: 0.02em;
        }
        
        /* 顶部导航 */
        .header {
            background: #2C436F;
            color: white;
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(44, 67, 111, 0.15);
        }
        
        .header-back {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .header-back:active {
            transform: scale(0.92);
            background: rgba(255,255,255,0.1);
        }
        
        .header h1 {
            font-size: 17px;
            font-weight: 600;
            flex: 1;
            letter-spacing: 0.02em;
        }
        
        /* 提示横幅 - 温馨背景：月苍白 */
        .tip-banner {
            background: #F9F6E5;
            border: 1px solid #F9F6E5;
            border-radius: 12px;
            margin: 12px 16px;
            padding: 16px;
            text-align: center;
        }
        
        .tip-banner .content {
            color: #492D22;
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 12px;
            text-align: center;
        }
        
        .tip-banner .content .highlight {
            color: #2C436F;
            font-weight: 600;
        }
        
        .tip-banner .copy-btn {
            background: #2C436F;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 0 auto;
            -webkit-tap-highlight-color: transparent;
        }
        
        .tip-banner .copy-btn:hover,
        .tip-banner .copy-btn:active {
            background: #1a2d4d;
            transform: scale(0.96);
        }
        
        /* 格式说明 */
        .format-guide {
            background: white;
            margin: 12px 16px;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 12px rgba(44, 67, 111, 0.08);
            border: 1px solid rgba(44, 67, 111, 0.05);
        }
        
        .format-guide .title {
            font-weight: 600;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .format-guide .title i {
            color: #2C436F;
        }
        
        .format-guide .desc {
            color: #414b4e;
            font-size: 13px;
            margin-top: 8px;
            padding: 12px;
            background: #EAF0E2;
            border-radius: 8px;
        }
        
        /* 输入区域 */
        .input-section {
            background: white;
            margin: 12px 16px;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 12px rgba(44, 67, 111, 0.08);
            border: 1px solid rgba(44, 67, 111, 0.05);
        }
        
        .input-section .label {
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        
        .input-section textarea {
            width: 100%;
            min-height: 200px;
            padding: 12px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            font-family: monospace;
            line-height: 1.6;
        }
        
        .input-section textarea:focus {
            outline: none;
            border-color: #2C436F;
            box-shadow: 0 0 0 2px rgba(44, 67, 111, 0.1);
        }
        
        .input-section .parse-btn {
            width: 100%;
            padding: 12px;
            background: #2C436F;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }
        
        .input-section .parse-btn:hover,
        .input-section .parse-btn:active {
            background: #1a2d4d;
            transform: scale(0.95);
        }
        
        /* 清洗预览折叠面板 */
        .preview-section {
            background: white;
            margin: 12px 16px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(44, 67, 111, 0.08);
            border: 1px solid rgba(44, 67, 111, 0.05);
            display: none;
        }
        
        .preview-section.show {
            display: block;
        }
        
        .preview-header {
            padding: 14px 16px;
            background: #fafafa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid #e8e8e8;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.15s;
        }
        
        .preview-header:active {
            background: #f0f0f0;
        }
        
        .preview-header .title {
            font-weight: 600;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .preview-header .title i {
            color: #2C436F;
            transition: transform 0.3s;
        }
        
        .preview-section.collapsed .preview-header .title i {
            transform: rotate(-90deg);
        }
        
        .preview-body {
            padding: 16px;
        }
        
        .preview-section.collapsed .preview-body {
            display: none;
        }
        
        .preview-step {
            margin-bottom: 16px;
        }
        
        .preview-step:last-child {
            margin-bottom: 0;
        }
        
        .preview-step .step-title {
            font-size: 13px;
            color: #414b4e;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .preview-step .step-content {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .preview-step .step-content.cleaned {
            background: #F9F6E5;
            color: #492D22;
        }
        
        /* 结果预览 */
        .result-section {
            display: none;
        }
        
        .result-section.show {
            display: block;
        }
        
        .result-header {
            background: white;
            margin: 12px 16px 0;
            border-radius: 12px 12px 0 0;
            padding: 16px;
            border-bottom: 1px solid #e8e8e8;
            box-shadow: 0 4px 12px rgba(44, 67, 111, 0.08);
        }
        
        .result-header .title {
            font-weight: 600;
            color: #1a1a2e;
        }
        
        .result-header .count {
            color: #2C436F;
        }
        
        /* 分组卡片 */
        .group-card {
            background: white;
            margin: 0 16px 12px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(44, 67, 111, 0.08);
            border: 1px solid rgba(44, 67, 111, 0.05);
        }
        
        .group-card:first-of-type {
            border-radius: 0 0 12px 12px;
            margin-top: 0;
        }
        
        .group-header {
            padding: 14px 16px;
            background: #fafafa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid #e8e8e8;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.15s;
        }
        .group-header:active {
            background: #f0f0f0;
        }
        
        .group-header .group-name {
            font-weight: 600;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .group-header .group-name i {
            color: #999;
            transition: transform 0.3s;
        }
        
        .group-card.collapsed .group-name i {
            transform: rotate(-90deg);
        }
        
        .group-header .group-count {
            font-size: 13px;
            color: #414b4e;
        }
        
        .group-body {
            padding: 16px;
        }
        
        .group-card.collapsed .group-body {
            display: none;
        }
        
        /* 类型选择 */
        .type-section {
            margin-bottom: 16px;
        }
        
        .type-section .label {
            font-size: 13px;
            color: #414b4e;
            margin-bottom: 8px;
        }
        
        .type-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .type-option {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            color: #414b4e;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }
        
        .type-option:hover {
            border-color: #2C436F;
        }
        
        .type-option.selected {
            border-color: #2C436F;
            background: #EAF0E2;
            color: #2C436F;
        }
        
        .type-option:active {
            transform: scale(0.92);
        }
        
        .type-option input {
            display: none;
        }
        
        /* 事由选择 */
        .reason-section {
            margin-bottom: 16px;
        }
        
        .reason-section .label {
            font-size: 13px;
            color: #414b4e;
            margin-bottom: 8px;
        }
        
        .reason-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .reason-option {
            padding: 8px 14px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #414b4e;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }
        
        .reason-option:hover {
            border-color: #2C436F;
        }
        
        .reason-option.selected {
            border-color: #2C436F;
            background: #EAF0E2;
            color: #2C436F;
        }
        
        .reason-option:active {
            transform: scale(0.92);
        }
        
        .reason-option input {
            display: none;
        }
        
        .reason-other-input {
            width: 100%;
            margin-top: 8px;
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }
        
        .reason-other-input.show {
            display: block;
        }
        
        .reason-other-input:focus {
            outline: none;
            border-color: #2C436F;
            box-shadow: 0 0 0 2px rgba(44, 67, 111, 0.1);
        }
        
        /* 人员列表 */
        .people-list {
            border-top: 1px solid #e8e8e8;
            padding-top: 12px;
        }
        
        .people-list .label {
            font-size: 13px;
            color: #414b4e;
            margin-bottom: 8px;
        }
        
        .person-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.15s;
        }
        
        .person-item:active {
            background: #f5f5f5;
        }
        
        .person-item:last-child {
            border-bottom: none;
        }
        
        .person-item.not-found {
            color: #ff8a00;
        }
        
        .person-item.fuzzy-match {
            background: #fff7e6;
            border-left: 4px solid #fa8c16;
            padding-left: 6px;
        }
        
        .fuzzy-warning {
            margin-left: 6px;
            font-size: 16px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            min-height: 44px;
            vertical-align: middle;
        }
        
        .person-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #d9d9d9;
            border-radius: 4px;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: white;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }
        
        .person-checkbox.checked {
            background: #2C436F;
            border-color: #2C436F;
            transform: scale(1);
        }
        
        .person-checkbox.just-clicked {
            animation: checkPop 0.2s ease;
        }
        
        @keyframes checkPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .person-info {
            flex: 1;
        }
        
        .person-name {
            font-size: 14px;
            color: #1a1a2e;
        }
        
        .person-location {
            font-size: 12px;
            color: #414b4e;
            margin-left: 8px;
        }
        
        .person-item.not-found .person-location {
            color: #ff8a00;
        }
        
        /* 报告预览 */
        .report-preview {
            background: white;
            margin: 12px 16px;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 12px rgba(44, 67, 111, 0.08);
            border: 1px solid rgba(44, 67, 111, 0.05);
        }
        
        .report-preview .title {
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        
        .report-content {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        
        /* 底部按钮 */
        .bottom-actions {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e8e8e8;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }
        
        .bottom-btn {
            flex: 1;
            padding: 14px 0;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }
        
        .bottom-btn.secondary {
            background: #EAF0E2;
            color: #2C436F;
        }
        
        .bottom-btn.secondary:hover,
        .bottom-btn.secondary:active {
            background: #d4e0cc;
            transform: scale(0.96);
        }
        
        .bottom-btn.primary {
            background: #2C436F;
            color: white;
        }
        
        .bottom-btn.primary:hover,
        .bottom-btn.primary:active {
            background: #1a2d4d;
            transform: scale(0.96);
        }
        
        /* 提示消息 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2C436F;
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 3000;
            display: none;
            box-shadow: 0 4px 16px rgba(44, 67, 111, 0.3);
        }
        
        .toast.show {
            display: block;
            animation: toastIn 0.3s ease;
        }
        
        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, -40%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #414b4e;
        }
        
        /* Loading 动画 */
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #ff8a00;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .date-range-display {
            background: #F9F6E5;
            color: #492D22;
            padding: 10px 16px;
            border-radius: 8px;
            margin: 0 16px 12px;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        .date-range-display.show {
            display: block;
        }
        .date-range-display .highlight {
            color: #2C436F;
            font-weight: 600;
        }

        .reason-option.has-children {
            background: #F9F6E5;
            border-color: #ff8a00;
            color: #492D22;
            grid-column: span 3;
            text-align: center;
            font-weight: 500;
        }
        .reason-option.has-children.selected {
            background: #ff8a00;
            color: white;
            border-color: #ff8a00;
        }
        .sub-reason-menu {
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 文本高亮样式 */
        .highlight-name {
            color: #2C436F;
            font-weight: 600;
            background: rgba(253, 217, 95, 0.4);
            padding: 0 4px;
            border-radius: 3px;
        }
        
        .highlight-reason {
            color: #2C436F;
            font-weight: 600;
        }
        
        .copyable {
            cursor: pointer;
            position: relative;
            transition: background 0.15s;
        }
        .copyable:hover {
            background: #e0e0e0;
        }
        .copyable::after {
            content: '点击复制';
            position: absolute;
            top: 4px;
            right: 4px;
            font-size: 11px;
            color: #666;
            background: rgba(255,255,255,0.9);
            padding: 2px 6px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .copyable:hover::after {
            opacity: 1;
        }

        /* 全局加载遮罩 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #EAF0E2;
            z-index: 9999;

// ============================================
// 日期预提取（在文本清洗前执行，避免被误删）
// ============================================
function extractDateRangeFromText(text) {
    const currentYear = new Date().getFullYear();
    let year = currentYear;
    
    // 提取文本中的年份
    const yearMatches = text.matchAll(/(\d{4})年/g);
    for (const match of yearMatches) {
        const y = parseInt(match[1]);
        if (y >= 2020 && y <= 2030) {
            year = y;
            break;
        }
    }
    
    const pad = (n) => n.toString().padStart(2, '0');
    
    // 模式1: 4月29日至5月3日（支持前缀年份）
    let m = text.match(/(?:(\d{4})年)?(\d{1,2})月(\d{1,2})日\s*至\s*(\d{1,2})月(\d{1,2})日/);
    if (m) {
        const y = m[1] ? parseInt(m[1]) : year;
        return {
            start: `${y}-${pad(m[2])}-${pad(m[3])}`,
            end: `${y}-${pad(m[4])}-${pad(m[5])}`
        };
    }
    
    // 模式2: 4月29日到5月3日
    m = text.match(/(?:(\d{4})年)?(\d{1,2})月(\d{1,2})日\s*到\s*(\d{1,2})月(\d{1,2})日/);
    if (m) {
        const y = m[1] ? parseInt(m[1]) : year;
        return {
            start: `${y}-${pad(m[2])}-${pad(m[3])}`,
            end: `${y}-${pad(m[4])}-${pad(m[5])}`
        };
    }
    
    // 模式3: 4.29-5.3 或 4.29至5.3 或 4.29到5.3（带点格式）
    m = text.match(/(\d{1,2})\.(\d{1,2})\s*[至到-]\s*(\d{1,2})\.(\d{1,2})/);
    if (m) {
        return {
            start: `${year}-${pad(m[1])}-${pad(m[2])}`,
            end: `${year}-${pad(m[3])}-${pad(m[4])}`
        };
    }
    
    // 模式4: 4月29日至5.3（混合格式）
    m = text.match(/(\d{1,2})月(\d{1,2})日\s*至\s*(\d{1,2})\.(\d{1,2})/);
    if (m) {
        return {
            start: `${year}-${pad(m[1])}-${pad(m[2])}`,
            end: `${year}-${pad(m[3])}-${pad(m[4])}`
        };
    }
    
    // 模式5: 4月29日到5.3（混合格式）
    m = text.match(/(\d{1,2})月(\d{1,2})日\s*到\s*(\d{1,2})\.(\d{1,2})/);
    if (m) {
        return {
            start: `${year}-${pad(m[1])}-${pad(m[2])}`,
            end: `${year}-${pad(m[3])}-${pad(m[4])}`
        };
    }
    
    return null;
}

// ============================================
// 从后端 API 加载宿舍数据

async function loadDormData() {
    try {
        const token = sessionStorage.getItem('authToken');
        
        if (!token) {
            window.location.replace('login.html');
            return;
        }
        
        const response = await fetch('/api/dorm-data', {
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });
        
        if (response.status === 401) {
            sessionStorage.removeItem('authToken');
            sessionStorage.removeItem('loggedIn');
            window.location.replace('login.html');
            return;
        }
        
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }
        
        const data = await response.json();
        window.dormData = data.dormData;
        window.nameIndex = data.nameIndex;

        document.getElementById('loadingOverlay').classList.add('hidden');
        
        if (typeof initApp === 'function') {
            initApp();
        }
    } catch (error) {
        console.error('加载宿舍数据失败:', error);
        document.querySelector('.loading-spinner-large').style.display = 'none';
        document.querySelector('.loading-text').style.display = 'none';
        document.getElementById('loadingError').classList.add('show');
    }
}

const subReasons = ['分团委', '学生会', '学习', '合唱团', '运动会', '警乐团', '羽毛球', '篮球队', '校督', '其他'];

// ============================================
// OCR 流水线模式检测与自动解析
// ============================================
function checkOCRPipelineMode() {
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    if (mode === 'ocr-pipeline' || mode === 'text-pipeline') {
        const context = JSON.parse(localStorage.getItem('ocrContext') || '{}');
        
        // OCR 和 manual-upload 直接输入的文本均启用模糊匹配
        // 仅当明确标记为文件上传时禁用
        if (mode === 'ocr-pipeline') {
            state.enableFuzzyMatch = true;
        } else {
            state.enableFuzzyMatch = context.isFileUpload !== true;
        }
        
        const ocrText = localStorage.getItem('ocrRawText');
        if (ocrText) {
            updateToOCRPipelineUI();
            
            const inputText = document.getElementById('inputText');
            inputText.value = ocrText;
            
            setTimeout(() => {
                parseInput();
            }, 300);
        }
    }
}

function updateToOCRPipelineUI() {
    const mode = new URLSearchParams(window.location.search).get('mode');

    bottomActions.innerHTML = `

            ${backBtnText}

        </button>
    `;

}

function goBackToUpload() {
    localStorage.removeItem('ocrRawText');
    localStorage.removeItem('ocrContext');
    window.location.href = 'upload.html';
}

function confirmAndReturn() {
    const updates = {};
    let count = 0;
    
    state.groups.forEach(group => {
        group.people.forEach(p => {
            if (!p.checked) return;
            
            let reason = '';
            if (group.leaveType === 'leaveInside') {
                reason = group.reason || '其他';
            }
            
            updates[p.name] = {
                status: group.leaveType,
                reason: reason,
            };
            count++;
        });
    });
    
    if (count === 0) { showToast('请至少勾选一名人员'); return; }
    
    const dateRange = state.dateRange;
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    if (dateRange && dateRange.start && dateRange.end) {
        const startDate = new Date(dateRange.start);
        const endDate = new Date(dateRange.end);
        if (endDate < today) {
            const userConfirm = confirm('该假单已过期，确认应用？');
            if (!userConfirm) {
                return;
            }
        }
        if (startDate > today) {
            const userConfirm = confirm('该假单尚未生效（开始日期为 ' + dateRange.start + '），是否仍要提前应用？');
            if (!userConfirm) {
                return;
            }
        }
    }
    
    if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
    
    const pendingData = {
        dateRange: dateRange,
        records: updates
    };
    localStorage.setItem('pendingLeaveRecords', JSON.stringify(pendingData));
    
    showToast(`已确认 ${count} 人，正在应用假单...`);
    
    setTimeout(() => {
        window.location.href = 'index.html?applyLeaves=1';
    }, 800);
}

function buildNameIndex() {
    for (const grade in window.dormData) {
        for (const className in window.dormData[grade]) {
            for (const dorm in window.dormData[grade][className]) {
                window.dormData[grade][className][dorm].forEach((name, index) => {
                    if (name) {
                        if (!state.nameIndex[name]) {
                            state.nameIndex[name] = {
                                name: name,
                                grade: grade,
                                className: className,
                                dorm: dorm,
                                bed: index + 1
                            };
                        }
                        state.allNames.push(name);
                        for (let i = 0; i < name.length; i++) {
                            for (let len = 2; len <= 4 && i + len <= name.length; len++) {
                                state.namePatterns.push(name.substr(i, len));
                            }
                        }
                    }
                });
            }
        }
    }
    state.allNames = [...new Set(state.allNames)];
    state.namePatterns = [...new Set(state.namePatterns)];
}

// ============================================
// 输入预处理（清洗阶段）- 增强版 v4
// ============================================
function cleanInputText(text) {
    let cleaned = text;
    let hasStudioMarker = false;
    let studioType = '';
    
    // ===== 阶段1: OCR常见错误修正映射 =====
    const ocrCorrections = {
        '据警务': '数据警务',
        '据警': '数据警',
        '全安': '网安',
        '像安': '网安',
        '阿sier': '阿sir',
        '阿Sier': '阿sir',
        '阿SIR': '阿sir',
        '啊sir': '阿sir',
        '啊SIR': '阿sir',
        'sir': '阿sir',
        'Sir': '阿sir',
        '自媒体': '阿sir',
        '自媒体工作室': '阿sir',
        '预备阿sir': '阿sir',
        '预备阿Sir': '阿sir',
    };
    
    for (const [wrong, correct] of Object.entries(ocrCorrections)) {
        cleaned = cleaned.replace(new RegExp(wrong, 'g'), correct);
    }
    
    // ===== 阶段2: 检测事由标记 =====
    if (/数据分析工作室|数分工作室/i.test(text)) {
        hasStudioMarker = true;
        studioType = '数分';
    } else if (/数据实战工作室|数实战工作室/i.test(text)) {
        hasStudioMarker = true;
        studioType = '数实战';
    } else if (/网安工作室/i.test(text)) {
        hasStudioMarker = true;
        studioType = '网安';
    } else if (/舆情工作室/i.test(text)) {
        hasStudioMarker = true;
        studioType = '舆情';
    } else if (/网管工作室/i.test(text)) {
        hasStudioMarker = true;
        studioType = '网管';
    } else if (/阿\s*[sS][iI][rR]|阿sir|阿Sir|预备阿sir|自媒体工作室/i.test(text)) {
        hasStudioMarker = true;
        studioType = '阿sir';
    } else if (/数分|数据分析/i.test(text) && !studioType) {
        hasStudioMarker = true;
        studioType = '数分';
    } else if (/网安\b(?!全)/i.test(text) && !studioType) {
        hasStudioMarker = true;
        studioType = '网安';
    } else if (/工作室/i.test(text) && !studioType) {
        hasStudioMarker = true;
        studioType = '工作室';
    }
    
    // ===== 阶段3: 严格提取人员列表区域 =====
    let personnelContent = '';
    
    const startPatterns = [
        /(?:具体)?\s*人员\s*[如]?[下]?[：:\n]\s*([\s\S]*?)(?=\d{4}\s*年|落款|签名|日期|$)/i,
        /(?:名单|人员)[：:\n]\s*([\s\S]*?)(?=\d{4}\s*年|落款|签名|日期|$)/i,
        /(?:以下|下列)[是为]?\s*(?:人员|名单|同学|学生)[：:\n]\s*([\s\S]*?)(?=\d{4}\s*年|落款|签名|日期|$)/i,
    ];
    
    for (const pattern of startPatterns) {
        const match = cleaned.match(pattern);
        if (match && match[1]) {
            personnelContent = match[1];
            break;
        }
    }
    
    if (!personnelContent) {
        const classNamePattern = /(?:[\u4e00-\u9fa5]{2,6}\d{4}|[\u4e00-\u9fa5]{2,4}[:：])\s*[\u4e00-\u9fa5]{2,4}(?:[,，、\s][\u4e00-\u9fa5]{2,4})*/g;
        const matches = cleaned.match(classNamePattern);
        if (matches) {
            personnelContent = matches.join('\n');
        }
    }
    
    if (personnelContent.trim()) {
        cleaned = personnelContent;
    }
    
    // ===== 阶段4: 去除无关内容 =====
    
    // 4.1 去除事由描述性长文本（限制单行，避免跨行误删日期）
    const descriptionsToRemove = [
        /由于[^\n]*?备赛[^\n]*?(?=\n|$)/gi,
        /[由因]于[^\n]*?(?:原因|理由)[^\n]*?(?=\n|$)/gi,
        /(?:申请|恳请|望请)[^\n]*?(?:批准|同意|准许)[^\n]*?(?=\n|$)/gi,
        /(?:参加|参与)[^\n]*?(?:比赛|竞赛|活动|培训)[^\n]*?(?=\n|$)/gi,
        /(?:备赛|训练)[^\n]*?(?:需要|因此)[^\n]*?(?=\n|$)/gi,
        /赛程[^\n]*?紧张[^\n]*?(?=\n|$)/gi,
        /新大陆杯[^\n]*?(?=\n|$)/gi,
        /2026\s*江苏省\s*大学生\s*计算机[^\n]*?(?=\n|$)/gi,
        /计算机设计[^\n]*?(?=\n|$)/gi,
        /设计大赛[^\n]*?(?=\n|$)/gi,
        /部分成员[^\n]*?(?=\n|$)/gi,
    ];
    
    for (const pattern of descriptionsToRemove) {
        cleaned = cleaned.replace(pattern, ' ');
    }
    
    // 4.2 去除宿舍-床位编号
    cleaned = cleaned.replace(/\d{3,4}-\d{1,3}(?:-\d{1,2})?/g, ' ');
    
    // 4.3 增强班级前缀去除
    cleaned = cleaned.replace(/[\u4e00-\u9fa5]{2,8}\d{4}/g, ' ');
    
    // 4.4 去除残留的孤立冒号和顿号
    cleaned = cleaned.replace(/\s*[：:、]\s*/g, ' ');
    
    // 4.5 去除引导语本身
    cleaned = cleaned.replace(/(?:具体)?\s*人员[如]?[下]?[是为]?[：:\n]*/gi, '\n');
    cleaned = cleaned.replace(/(?:名单|人员)[：:\n]*/gi, '\n');
    cleaned = cleaned.replace(/(?:以下|下列)[是为]?\s*(?:人员|名单|同学|学生)[：:\n]*/gi, '\n');
    
    // 4.6 去除落款和日期（仅去除完整中文日期，保留人员列表中可能存在的日期标记）
    cleaned = cleaned.replace(/\d{4}\s*年\s*\d{1,2}\s*月\s*\d{1,2}\s*[日号]?/g, ' ');
    cleaned = cleaned.replace(/(?:预备)?\s*阿\s*[sS][iI][rR]\s*(?:自媒体)?\s*工作室/gi, ' ');
    cleaned = cleaned.replace(/(?:数据)?\s*分析\s*工作室/gi, ' ');
    cleaned = cleaned.replace(/网络安全工作室/gi, ' ');
    cleaned = cleaned.replace(/(情况说明|尊敬的大队老师|大队老师)/gi, ' ');
    cleaned = cleaned.replace(/落款[：:\n]?/gi, ' ');
    
    // 4.7 去除//包裹的标记
    cleaned = cleaned.replace(/\/(事假|请假离校|请假外出|外出|离校)\//g, '$1');
    
    // 4.8 标准化分隔符
    cleaned = cleaned.replace(/[\/\\、，；;|]/g, ' ');
    
    // ===== 阶段5: 去重处理 =====
    const lines = cleaned.split('\n').map(l => l.trim()).filter(l => l);
    const seenLines = new Set();
    const uniqueLines = [];
    
    const reasonKeywordsSet = new Set([
        '数分', '数分工作室', '数据分析工作室', '数据分析', 'data',
        '网安', '网安工作室', '网络安全工作室', '网络安全',
        '阿sir', '啊sir', '啊SIR', '预备阿sir', '自媒体工作室', 
        '预备阿sir自媒体工作室', '自媒体', 'sir', '阿SIR', '阿Sir',
        '数据实战', '数据实战工作室', '数实战', '网管', '网管工作室',
        '分团委', '学生会', '合唱团', '运动会', '警乐团', '羽毛球', '篮球队', '篮球', '篮球队假单',
        '辩论队', '辩队', '备赛', '比赛', '竞赛', '复习', '学习', '自习',
        '校督', '校督促', '请假离校', '离校', '回家', '请假外出', '外出', '出门', '事假', '假'
    ]);
    
    for (const line of lines) {
        const namesInLine = line.match(/[\u4e00-\u9fa5]{2,4}/g) || [];
        const filteredNames = namesInLine.filter(n => !reasonKeywordsSet.has(n));
        
        if (filteredNames.length === 0) {
            uniqueLines.push(line);
            continue;
        }
        
        const lineSignature = filteredNames.slice().sort().join(',');
        
        if (!seenLines.has(lineSignature)) {
            seenLines.add(lineSignature);
            uniqueLines.push(line);
        }
    }
    
    cleaned = uniqueLines.join('\n');
    
    // ===== 阶段6: 最终清理 =====
    cleaned = cleaned.replace(/[^\S\n]+/g, ' ');
    cleaned = cleaned.replace(/\n+/g, '\n');
    cleaned = cleaned.split('\n').map(line => line.trim()).join('\n').trim();
    
    // ===== 阶段7: 添加事由标记 =====
    if (hasStudioMarker && studioType && cleaned) {
        const lines = cleaned.split('\n');
        const firstLine = lines[0].trim();
        
        const isFirstLinePureReason = (isReasonKeyword(firstLine) && extractNamesFromLine(firstLine).length === 0);
        const firstLineHasReasonWithName = (isReasonKeyword(firstLine.split(/\s+/)[0]) && extractNamesFromLine(firstLine).length > 0);
        
        if (!isFirstLinePureReason && !firstLineHasReasonWithName) {
            cleaned = studioType + '\n' + cleaned;
        }
    }
    
    return cleaned;
}

// ============================================
// 从清洗后的文本中提取人名
// ============================================
function extractNamesFromCleanedText(text) {
    const names = [];
    const foundNames = new Set();
    
    const candidates = text.match(/[\u4e00-\u9fa5]{2,4}/g) || [];
    
    for (const candidate of candidates) {
        if (isReasonKeyword(candidate)) continue;
        
        const result = fuzzyMatchName(candidate);
        if (result && result.matchedName && !foundNames.has(result.matchedName)) {
            names.push({ 
                name: result.matchedName, 
                originalInput: result.originalInput, 
                matchType: result.matchType,
                confidence: result.confidence
            });
            foundNames.add(result.matchedName);
        }
    }
    
    return names;
}

function fuzzyMatchName(input) {
    if (!input || input.length < 2) return null;

    const candidates = state.allNames.filter(name => {
        return name[0] === input[0] || Math.abs(name.length - input.length) <= 2;
    });

    for (const name of candidates) {
        if (input === name) {
            return { matchedName: name, originalInput: input, matchType: 'exact', confidence: 'high', distance: 0 };
        }
    }

    if (!state.enableFuzzyMatch) {
        if (input.length >= 2 && /[\u4e00-\u9fa5].*[\u4e00-\u9fa5]/.test(input)) {
            return { matchedName: null, originalInput: input, matchType: 'none', confidence: 'low', distance: null };
        }
        return null;
    }

    const pickBest = (matches) => {
        return matches.sort((a, b) => {
            if (a.distance !== b.distance) return a.distance - b.distance;
            return b.name.length - a.name.length;
        })[0];
    };

    let matches = [];

    for (const name of candidates) {
        if (name.includes(input) && input.length >= 2) {
            matches.push({ name, distance: levenshteinDistance(input, name) });
        }
    }
    if (matches.length > 0) {
        const best = pickBest(matches);
        return { matchedName: best.name, originalInput: input, matchType: 'fuzzy', confidence: 'high', distance: best.distance };
    }

    for (const name of candidates) {
        if (input.includes(name) && name.length >= 2) {
            matches.push({ name, distance: levenshteinDistance(input, name) });
        }
    }
    if (matches.length > 0) {
        const best = pickBest(matches);
        return { matchedName: best.name, originalInput: input, matchType: 'fuzzy', confidence: 'high', distance: best.distance };
    }

    const getCommonChars = (a, b) => {
        const setA = new Set(a);
        let count = 0;
        for (const ch of b) {
            if (setA.has(ch)) {
                count++;
                setA.delete(ch);
            }
        }
        return count;
    };

    const meetsQualityThreshold = (input, name, distance) => {
        const maxLen = Math.max(input.length, name.length);
        const common = getCommonChars(input, name);
        if (common < Math.ceil(maxLen / 2)) return false;
        if (distance === 2 && Math.abs(input.length - name.length) > 1) return false;
        return true;
    };

    for (const name of candidates) {
        if (name[0] === input[0]) {
            const dist = levenshteinDistance(input, name);
            if (dist <= 2 && dist > 0 && meetsQualityThreshold(input, name, dist)) {
                matches.push({ name, distance: dist });
            }
        }
    }
    if (matches.length > 0) {
        const best = pickBest(matches);
        const common = getCommonChars(input, best.name);
        const maxLen = Math.max(input.length, best.name.length);
        const confidence = (best.distance >= 2 && common < maxLen * 0.6) ? 'low' : 'high';
        return { matchedName: best.name, originalInput: input, matchType: 'fuzzy', confidence, distance: best.distance };
    }

    for (const name of candidates) {
        if (name[0] === input[0] && name[name.length - 1] === input[input.length - 1] && Math.abs(name.length - input.length) <= 2) {
            const dist = levenshteinDistance(input, name);
            if (dist <= 1 && dist > 0) {
                matches.push({ name, distance: dist });
            }
        }
    }
    if (matches.length > 0) {
        const best = pickBest(matches);
        return { matchedName: best.name, originalInput: input, matchType: 'fuzzy', confidence: 'high', distance: best.distance };
    }

    for (const name of candidates) {
        let hasSubstr = false;
        if (input.length >= 2) {
            for (let i = 0; i <= name.length - input.length; i++) {
                const substr = name.substr(i, input.length);
                const dist = levenshteinDistance(input, substr);
                if (dist <= 1) {
                    hasSubstr = true;
                    break;
                }
            }
        }
        if (hasSubstr) {
            const dist = levenshteinDistance(input, name);
            if (dist <= 3 && dist > 0 && meetsQualityThreshold(input, name, dist)) {
                matches.push({ name, distance: dist });
            }
        }
    }
    if (matches.length > 0) {
        const best = pickBest(matches);
        return { matchedName: best.name, originalInput: input, matchType: 'fuzzy', confidence: 'low', distance: best.distance };
    }

    if (input.length >= 2 && /[\u4e00-\u9fa5].*[\u4e00-\u9fa5]/.test(input)) {
        return { matchedName: null, originalInput: input, matchType: 'none', confidence: 'low', distance: null };
    }

    return null;
}

// 核心算法：滑动窗口配对引擎
// ============================================

function isReasonKeyword(token) {
    if (reasonKeywords[token]) return true;
    
    const extendedReasons = {
        '数分': true, '网安': true, '阿sir': true, '辩论队': true,
        '备赛': true, '复习': true, '学习': true, '校督': true,
        '分团委': true, '学生会': true, '合唱团': true,
        '运动会': true, '警乐团': true, '羽毛球': true, '篮球队': true,
        '数实战': true, '网管': true,
        '请假离校': true, '离校': true, '事假': true, '外出': true,
        '请假外出': true, '回家': true, '出门': true
    };
    return extendedReasons[token] || false;
}

function getLeaveTypeByReason(reason) {
    const mapped = reasonKeywords[reason];
    if (mapped === 'leaveSchool') return 'leaveSchool';
    if (mapped === 'leaveOutside') return 'leaveOutside';
    return 'leaveInside';
}

function findName(token) {
    if (!token || token.length < 2) return null;
    
    const result = fuzzyMatchName(token);
    if (result && result.matchedName) {
        return { 
            name: result.matchedName, 
            originalInput: result.originalInput, 
            matchType: result.matchType,
            confidence: result.confidence
        };
    }
    return null;
}

function detectReasonInLineAdvanced(line) {
    const result = { found: false, reason: null, leaveType: 'leaveInside' };
    
    for (const [keyword, mapped] of Object.entries(reasonKeywords)) {
        if (line.includes(keyword)) {
            const isLeaveType = mapped === 'leaveSchool' || mapped === 'leaveOutside';
            return {
                found: true,
                reason: isLeaveType ? (mapped === 'leaveSchool' ? '请假离校' : '请假外出') : mapped,
                leaveType: isLeaveType ? mapped : 'leaveInside',
                matchedKeyword: keyword
            };
        }
    }
    
    return result;
}

function isTitlePattern(line) {
    if (!line || line.length > 20) return false;
    
    const hasReason = detectReason(line).found;
    
    const tokens = line.split(/[\s,，、]+/).filter(t => t.length >= 2);
    let hasName = false;
    for (const token of tokens) {
        if (findName(token)) {
            hasName = true;
            break;
        }
    }
    
    return hasReason && !hasName;
}

function parseSmartFormat(originalText, cleanedText) {
    const sections = splitIntoSections(originalText);
    
    const allEntries = [];
    
    sections.forEach(section => {
        const entries = parseSection(section.lines, section.defaultReason, section.defaultLeaveType);
        allEntries.push(...entries);
    });
    
    const groups = {};
    
    allEntries.forEach(entry => {
        const key = `${entry.leaveType}:${entry.reason}`;
        if (!groups[key]) {
            groups[key] = {
                reason: entry.reason,
                leaveType: entry.leaveType,
                names: []
            };
        }
        const nameKey = typeof entry.name === 'object' ? entry.name.name : entry.name;
        if (!groups[key].names.some(n => (typeof n === 'object' ? n.name : n) === nameKey)) {
            groups[key].names.push(entry.name);
        }
    });
    
    return Object.values(groups).map(g => ({
        ...g,
        people: matchNames(dedupeNameObjects(g.names)),
        name: g.reason
    }));
}

function splitIntoSections(text) {
    const sections = [];
    const lines = text.split('\n');
    
    let currentSection = null;
    
    lines.forEach(line => {
        line = line.trim();
        if (!line) return;
        
        const sectionHeader = parseSectionHeader(line);
        
        if (sectionHeader.isHeader) {
            if (currentSection && currentSection.lines.length > 0) {
                sections.push(currentSection);
            }
            currentSection = {
                lines: [],
                defaultReason: sectionHeader.reason,
                defaultLeaveType: sectionHeader.leaveType
            };
        } else {
            if (!currentSection) {
                currentSection = {
                    lines: [],
                    defaultReason: null,
                    defaultLeaveType: 'leaveInside'
                };
            }
            currentSection.lines.push(line);
        }
    });
    
    if (currentSection && currentSection.lines.length > 0) {
        sections.push(currentSection);
    }
    
    return sections;
}

function parseSectionHeader(line) {
    const result = { isHeader: false, reason: null, leaveType: 'leaveInside' };
    
    let cleanLine = line.replace(/\//g, '').trim();
    
    const reasonInfo = detectReason(cleanLine);
    if (!reasonInfo.found) return result;
    
    const tokens = cleanLine.split(/[\s,，、]+/).filter(t => t.length >= 2);
    let hasName = false;
    for (const token of tokens) {
        if (isReasonKeyword(token)) {
            continue;
        }
        if (findName(token)) {
            hasName = true;
            break;
        }
    }
    
    if (!hasName) {
        result.isHeader = true;
        result.reason = reasonInfo.reason;
        result.leaveType = reasonInfo.leaveType;
    }
    
    return result;
}

function parseSection(lines, sectionDefaultReason, sectionDefaultLeaveType) {
    const entries = [];
    let currentDefaultReason = sectionDefaultReason;
    let currentDefaultLeaveType = sectionDefaultLeaveType;
    
    lines.forEach(line => {
        const lineEntries = parseLine(line, currentDefaultReason, currentDefaultLeaveType);
        entries.push(...lineEntries);
        
        const lineTokens = line.replace(/\d{3,4}-\d{1,3}(?:-\d{1,2})?/g, ' ')
                               .replace(/[\u4e00-\u9fa5]+\d{4}/g, ' ')
                               .trim()
                               .split(/[\s,，、]+/).filter(t => t.length >= 2);
        if (lineTokens.length > 0) {
            const firstToken = lineTokens[0];
            if (isReasonKeyword(firstToken) && !findName(firstToken)) {
                currentDefaultReason = firstToken;
                currentDefaultLeaveType = getLeaveTypeByReason(currentDefaultReason);
            }
        }
    });
    
    return entries;
}

function parseLine(line, sectionDefaultReason, sectionDefaultLeaveType) {
    const entries = [];
    
    let cleanLine = line.replace(/\d{3,4}-\d{1,3}(?:-\d{1,2})?/g, ' ')
                        .replace(/[\u4e00-\u9fa5]+\d{4}/g, ' ')
                        .trim();
    
    if (!cleanLine) return entries;
    
    const tokens = cleanLine.split(/[\s,，、]+/).filter(t => t.length >= 2);
    
    const tokenInfos = tokens.map((token, idx) => ({
        idx,
        token,
        isReason: isReasonKeyword(token) && !findName(token),
        name: findName(token)
    }));
    
    let lineDefaultReason = sectionDefaultReason;
    let lineDefaultLeaveType = sectionDefaultLeaveType;
    if (tokenInfos.length > 0 && tokenInfos[0].isReason) {
        lineDefaultReason = tokenInfos[0].token;
        lineDefaultLeaveType = getLeaveTypeByReason(lineDefaultReason);
    }
    
    let i = 0;
    while (i < tokenInfos.length) {
        const info = tokenInfos[i];
        
        if (info.name) {
            let specificReason = null;
            let specificLeaveType = lineDefaultLeaveType;
            
            if (i + 1 < tokenInfos.length && tokenInfos[i + 1].isReason) {
                specificReason = tokenInfos[i + 1].token;
                specificLeaveType = getLeaveTypeByReason(specificReason);
                i += 2;
            } else if (i - 1 >= 0 && tokenInfos[i - 1].isReason) {
                specificReason = tokenInfos[i - 1].token;
                specificLeaveType = getLeaveTypeByReason(specificReason);
                i++;
            } else {
                specificReason = lineDefaultReason || '其他';
                specificLeaveType = lineDefaultLeaveType;
                i++;
            }
            
            entries.push({
                name: info.name,
                reason: specificReason,
                leaveType: specificLeaveType
            });
        } else {
            i++;
        }
    }
    
    return entries;
}

// ============================================
// 终极智能解析器（改用后端 DeepSeek 智能分组）
// ============================================
async function parseInput() {
    const text = document.getElementById('inputText').value.trim();
    if (!text) { showToast('请输入人名列表'); return; }
    
    if (navigator.vibrate) navigator.vibrate(15);
    
    state.groups = [];
    
    // 预提取日期范围（优先于后端识别，避免清洗误删）
    const preExtractedDate = extractDateRangeFromText(text);
    if (preExtractedDate) {
        state.dateRange = preExtractedDate;
    }
    
    const cleanedText = cleanInputText(text);
    state.lastCleanedText = cleanedText;
    
    showToast('正在智能分组...');
    
    try {
        const response = await fetch('/api/smart-group', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: cleanedText })
        });
        const data = await response.json();
        
        if (!data.success || !data.groups || data.groups.length === 0) {
            throw new Error('智能分组失败');
        }
        
        state.groups = data.groups.map((g, idx) => {
            const isCustomReason = g.reason && !subReasons.includes(g.reason) && g.reason !== '其他';
            return {
                id: idx,
                name: g.reason,
                reason: g.reason,
                leaveType: g.leaveType,
                people: matchNames(g.people),
                showSubReasons: subReasons.includes(g.reason) || g.reason === '其他' || isCustomReason
            };
        });
        
        // 优先使用预提取的日期范围（更可靠）
        if (!preExtractedDate) {
            state.dateRange = data.dateRange || null;
        }
        
        state.lastParseResult = state.groups;
        
        updatePreviewPanel(text, cleanedText, state.groups);
        
        renderGroups();
        updateReport();
        updateDateRangeDisplay();
        
        document.getElementById('resultSection').classList.add('show');
        document.getElementById('previewSection').classList.add('show');
        document.getElementById('bottomActions').style.display = 'flex';
        document.getElementById('groupCount').textContent = state.groups.length;
        
        const totalMatched = state.groups.reduce((sum, g) => sum + g.people.filter(p => p.matched).length, 0);
        showToast(`解析到 ${state.groups.length} 组，共 ${totalMatched} 人`);
    } catch (error) {
        console.error('智能分组请求失败:', error);
        showToast('智能分组失败，正在使用本地解析...');
        fallbackParseInput(text, cleanedText);
    }
}

function fallbackParseInput(text, cleanedText) {
    const strategies = [
        parseSmartFormat,
        parseStructuredFormat,
        parseInlineFormat,
        parseMixedFormat,
        parseLooseFormat
    ];
    
    let bestResult = null;
    let maxMatched = 0;
    
    for (const strategy of strategies) {
        const result = strategy(text, cleanedText);
        const matchedCount = result.reduce((sum, g) => sum + g.people.filter(p => p.matched).length, 0);
        
        if (matchedCount > maxMatched) {
            maxMatched = matchedCount;
            bestResult = result;
        }
        
        if (matchedCount >= 5) break;
    }
    
    if (!bestResult || bestResult.length === 0) {
        bestResult = parseFallback(text, cleanedText);
    }
    
    state.groups = bestResult.map((g, idx) => {
        const isCustomReason = g.reason && !subReasons.includes(g.reason) && g.reason !== '其他';
        return {
            ...g,
            id: idx,
            showSubReasons: subReasons.includes(g.reason) || g.reason === '其他' || isCustomReason
        };
    });
    
    // 保留预提取的日期，不再强制置空
    // state.dateRange = null;  // 已删除此行
    
    state.lastParseResult = bestResult;
    
    updatePreviewPanel(text, cleanedText, bestResult);
    
    renderGroups();
    updateReport();
    updateDateRangeDisplay();
    
    document.getElementById('resultSection').classList.add('show');
    document.getElementById('previewSection').classList.add('show');
    document.getElementById('bottomActions').style.display = 'flex';
    document.getElementById('groupCount').textContent = state.groups.length;
    
    const totalMatched = state.groups.reduce((sum, g) => sum + g.people.filter(p => p.matched).length, 0);
    showToast(`解析到 ${state.groups.length} 组，共 ${totalMatched} 人`);
}

function updatePreviewPanel(original, cleaned, result) {
    document.getElementById('originalPreview').textContent = original || '（空）';
    document.getElementById('cleanedPreview').textContent = cleaned || '（空）';
    
    let resultHtml = '';
    if (result && result.length > 0) {
        result.forEach((group, idx) => {
            const matchedNames = group.people.filter(p => p.matched).map(p => p.name).join('、');
            const unmatchedNames = group.people.filter(p => !p.matched).map(p => p.name).join('、');
            
            const typeLabel = group.leaveType === 'leaveSchool' ? '[离校]' : 
                             group.leaveType === 'leaveOutside' ? '[外出]' : '[事假]';
            
            resultHtml += `【${typeLabel}${group.reason}】\n`;
            if (matchedNames) {
                resultHtml += `  匹配: ${matchedNames}\n`;
            }
            if (unmatchedNames) {
                resultHtml += `  未匹配: ${unmatchedNames}\n`;
            }
        });
    } else {
        resultHtml = '未识别到有效数据';
    }
    
    document.getElementById('resultPreview').innerHTML = resultHtml
        .replace(/【(.+?)】/g, '<span style="color:#2C436F;font-weight:600;">【$1】</span>')
        .replace(/匹配: (.+?)(?= 未匹配:|\n|$)/g, '匹配: <span style="color:#2C436F;">$1</span>')
        .replace(/未匹配: (.+?)(?=\n|$)/g, '未匹配: <span style="color:#ff8a00;">$1</span>')
        .replace(/\n/g, '<br>');
}

function parseStructuredFormat(originalText, cleanedText) {
    const groups = [];
    const lines = originalText.split('\n');
    let currentReason = '';
    let currentLeaveType = 'leaveInside';
    let currentBuffer = [];
    
    const flushBuffer = () => {
        if (currentBuffer.length > 0 && currentReason) {
            groups.push({
                name: currentReason,
                reason: currentReason,
                leaveType: currentLeaveType,
                people: matchNames(currentBuffer)
            });
            currentBuffer = [];
        }
    };
    
    for (let i = 0; i < lines.length; i++) {
        let line = lines[i].trim();
        if (!line) {
            flushBuffer();
            continue;
        }
        
        const reasonInfo = detectReason(line);
        if (reasonInfo.found && isTitleLine(line, lines[i-1], lines[i+1])) {
            flushBuffer();
            currentReason = reasonInfo.reason;
            currentLeaveType = reasonInfo.leaveType;
            continue;
        }
        
        if (line.match(/^(\/+.*\/+|\+)/)) {
            flushBuffer();
            continue;
        }
        
        const names = extractNamesFromLine(line);
        currentBuffer.push(...names);
    }
    
    flushBuffer();
    return groups;
}

function parseInlineFormat(originalText, cleanedText) {
    const groups = {};
    const lines = originalText.split('\n');
    
    lines.forEach(line => {
        line = line.trim();
        if (!line) return;
        
        if (isPureTitle(line)) return;
        
        const reasonInfo = detectReasonInLine(line);
        const cleanLine = reasonInfo.cleanLine || line;
        
        const names = extractNamesFromLine(cleanLine);
        
        if (names.length > 0 && reasonInfo.found) {
            const key = `${reasonInfo.leaveType}:${reasonInfo.reason}`;
            if (!groups[key]) {
                groups[key] = {
                    reason: reasonInfo.reason,
                    leaveType: reasonInfo.leaveType,
                    names: []
                };
            }
            groups[key].names.push(...names);
        }
    });
    
    return Object.values(groups).map(g => ({
        ...g,
        people: matchNames(dedupeNameObjects(g.names))
    }));
}

function parseMixedFormat(originalText, cleanedText) {
    const groups = {};
    const segments = originalText.split(/\n\s*\n/);
    
    segments.forEach(segment => {
        const lines = segment.split('\n').filter(l => l.trim());
        if (lines.length === 0) return;
        
        let segmentReason = null;
        let segmentLeaveType = 'leaveInside';
        
        const firstLineReason = detectReason(lines[0]);
        if (firstLineReason.found && lines[0].length < 20) {
            segmentReason = firstLineReason.reason;
            segmentLeaveType = firstLineReason.leaveType;
            lines.shift();
        }
        
        const allNames = [];
        lines.forEach(line => {
            const names = extractNamesFromLine(line);
            allNames.push(...names);
            
            if (!segmentReason) {
                const inlineReason = detectReasonInLine(line);
                if (inlineReason.found && allNames.length > 0) {
                    const key = `${inlineReason.leaveType}:${inlineReason.reason}`;
                    if (!groups[key]) {
                        groups[key] = {
                            reason: inlineReason.reason,
                            leaveType: inlineReason.leaveType,
                            names: []
                        };
                    }
                    groups[key].names.push(...allNames.splice(0));
                }
            }
        });
        
        if (segmentReason && allNames.length > 0) {
            const key = `${segmentLeaveType}:${segmentReason}`;
            if (!groups[key]) {
                groups[key] = {
                    reason: segmentReason,
                    leaveType: segmentLeaveType,
                    names: []
                };
            }
            groups[key].names.push(...allNames);
        }
    });
    
    return Object.values(groups).map(g => ({
        ...g,
        people: matchNames(dedupeNameObjects(g.names))
    }));
}

function parseLooseFormat(originalText, cleanedText) {
    const groups = {};
    const segments = originalText.split(/\n\s*\n/);
    
    segments.forEach(segment => {
        const lines = segment.split('\n').filter(l => l.trim());
        if (lines.length === 0) return;
        
        let segmentReason = null;

        if (firstLineReason.found && lines[0].length < 20) {

        }
        
        const allNames = [];
        lines.forEach(line => {
            const names = extractNamesFromLine(line);
            allNames.push(...names);
            
            if (!segmentReason) {
                const inlineReason = detectReasonInLine(line);
                if (inlineReason.found && allNames.length > 0) {
                    const key = `${inlineReason.leaveType}:${inlineReason.reason}`;
                    if (!groups[key]) {

                        };
                    }

                }
            }
        });
        
        if (segmentReason && allNames.length > 0) {

            if (!groups[key]) {
                groups[key] = {

                };
            }

        }
    });
    
    return Object.values(groups).map(g => ({

    }));
}

function parseFallback(originalText, cleanedText) {
    const allNames = extractNamesFromLine(originalText);
    if (allNames.length === 0) return [];
    
    let mainReason = '未分组';
    let mainLeaveType = 'leaveInside';
    
    const textLower = originalText.toLowerCase();
    for (const [keyword, mapped] of Object.entries(reasonKeywords)) {
        if (textLower.includes(keyword.toLowerCase())) {
            if (mapped === 'leaveSchool' || mapped === 'leaveOutside') {
                mainLeaveType = mapped;
                mainReason = mapped === 'leaveSchool' ? '请假离校' : '请假外出';
            } else {
                mainReason = mapped;
            }
            break;
        }
    }
    
    return [{
        name: mainReason,
        reason: mainReason === '未分组' ? '' : mainReason,
        leaveType: mainLeaveType,
        people: matchNames(allNames)
    }];
}

function detectReason(text) {
    const lower = text.toLowerCase();
    for (const [keyword, mapped] of Object.entries(reasonKeywords)) {
        if (lower.includes(keyword.toLowerCase())) {
            return {
                found: true,
                reason: mapped === 'leaveSchool' || mapped === 'leaveOutside' ? 
                    (mapped === 'leaveSchool' ? '请假离校' : '请假外出') : mapped,
                leaveType: mapped === 'leaveSchool' || mapped === 'leaveOutside' ? mapped : 'leaveInside',
                matchedKeyword: keyword
            };
        }
    }
    return { found: false };
}

function detectReasonInLine(line) {
    let result = { found: false, cleanLine: line };
    const parts = line.split(/\s+/);
    
    for (let i = 0; i < parts.length; i++) {
        const reasonCheck = detectReason(parts[i]);
        if (reasonCheck.found) {
            const cleanParts = parts.filter((_, idx) => idx !== i);
            return {
                found: true,
                reason: reasonCheck.reason,
                leaveType: reasonCheck.leaveType,
                cleanLine: cleanParts.join(' ')
            };
        }
    }
    
    return result;
}

function isTitleLine(current, prev, next) {
    if (current.length < 15 && detectReason(current).found) {
        if (next && (extractNamesFromLine(next).length > 0 || isDormFormat(next))) {
            return true;
        }
    }
    return false;
}

function isPureTitle(line) {
    if (line.length > 20) return false;
    const hasReason = detectReason(line).found;
    const hasName = extractNamesFromLine(line).length > 0;
    return hasReason && !hasName;
}

function extractNamesFromLine(line) {
    const names = [];
    const cleaned = line.replace(/\d{3,4}-\d{1,2}(?:-\d{1,2})?/g, ' ');
    
    const parts = cleaned.split(/[\s,，、]+/).filter(p => p && p.length >= 2);
    
    parts.forEach(part => {
        const result = fuzzyMatchName(part);
        if (result && result.matchedName) {
            names.push({ 
                name: result.matchedName, 
                originalInput: result.originalInput, 
                matchType: result.matchType,
                confidence: result.confidence
            });
        }
    });
    
    return dedupeNameObjects(names);
}

function extractNameFromMixed(text) {
    const cleaned = text.replace(/^\d{3,4}-\d{1,2}(?:-\d{1,2})?/, '');
    
    const matches = cleaned.match(/[\u4e00-\u9fa5]{2,4}/g);
    if (!matches) return null;
    
    for (const match of matches) {
        const result = fuzzyMatchName(match);
        if (result && result.matchedName) {
            return { 
                name: result.matchedName, 
                originalInput: result.originalInput, 
                matchType: result.matchType,
                confidence: result.confidence
            };
        }
    }
    
    return null;
}

function isDormFormat(text) {
    return /^\d{3,4}[- ]*\d{1,2}(?:[- ]*\d{1,2})?$/.test(text);
}

function parseDormFormat(text) {
    const matches = text.match(/(\d{3,4})[- ]*(\d{1,2})(?:[- ]*(\d{1,2}))?/);
    if (matches) {
        return {
            dorm: matches[1],
            bed: parseInt(matches[2]),
            fullDorm: `${matches[1]}-${matches[2]}`
        };
    }
    return null;
}

function levenshteinDistance(a, b) {
    const matrix = [];
    for (let i = 0; i <= b.length; i++) matrix[i] = [i];
    for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
    
    for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
            if (b.charAt(i-1) === a.charAt(j-1)) {
                matrix[i][j] = matrix[i-1][j-1];
            } else {
                matrix[i][j] = Math.min(
                    matrix[i-1][j-1] + 1,
                    matrix[i][j-1] + 1,
                    matrix[i-1][j] + 1
                );
            }
        }
    }
    return matrix[b.length][a.length];
}

function dedupeNameObjects(arr) {
    const seen = new Set();
    return arr.filter(obj => {
        const key = obj.name;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
    });
}

function matchNames(names) {
    return names.map(item => {
        const isObj = typeof item === 'object' && item !== null;
        const rawName = isObj ? item.name : item;
        const originalInput = isObj ? (item.originalInput || rawName) : rawName;
        let matchType = isObj ? (item.matchType || 'none') : (state.nameIndex[item] ? 'exact' : 'none');
        const confidence = isObj ? (item.confidence || 'high') : 'high';
        const info = state.nameIndex[rawName];
        return {
            name: rawName,
            matched: matchType !== 'none',
            matchType: matchType,
            originalInput: originalInput,
            confidence: confidence,
            info: info || { name: rawName, grade: '未知', className: '未知', dorm: '未知', bed: '-' },
            checked: matchType !== 'none'
        };
    });
}

function toggleSubReasons(event, groupId) {
    event.stopPropagation();
    event.preventDefault();
    
    const group = state.groups.find(g => g.id === groupId);
    if (group) {
        group.showSubReasons = !group.showSubReasons;
        renderGroups();
    }
}

function toggleGroup(groupId) {
    state.collapsedStates[groupId] = !state.collapsedStates[groupId];
    renderGroups();
}

function setGroupType(groupId, type) {
    const group = state.groups.find(g => g.id === groupId);
    if (group) {
        group.leaveType = type;
        if (type !== 'leaveInside') group.reason = '';
        renderGroups();
        updateReport();
    }
}

function setGroupReason(groupId, reason, isSub = false) {
    const group = state.groups.find(g => g.id === groupId);
    if (!group) return;
    
    group.reason = reason;
    if (isSub) {
        group.showSubReasons = true;
    }
    renderGroups();
    updateReport();
}

function setGroupOtherReason(groupId, value) {
    const group = state.groups.find(g => g.id === groupId);
    if (group && value.trim()) {
        group.reason = value.trim();
        group.name = value.trim(); // 同步更新显示名称
        renderGroups();
        updateReport();
    }
}

function togglePerson(event, groupId, name) {
    const group = state.groups.find(g => g.id === groupId);
    if (!group) return;
    const person = group.people.find(p => p.name === name);
    if (!person) return;
    
    person.checked = !person.checked;
    if (navigator.vibrate) navigator.vibrate(10);
    
    const personItem = event.currentTarget;
    if (personItem) {
        const checkbox = personItem.querySelector('.person-checkbox');
        if (checkbox) {
            checkbox.classList.toggle('checked', person.checked);
            checkbox.textContent = person.checked ? '✓' : '';
            checkbox.classList.add('just-clicked');
            setTimeout(() => checkbox.classList.remove('just-clicked'), 200);
        }
    }
    
    const card = document.querySelector(`.group-card[data-group-id="${groupId}"]`);
    if (card) {
        const groupNameEl = card.querySelector('.group-name');
        if (groupNameEl) {
            const iEl = groupNameEl.querySelector('i');
            const iHtml = iEl ? iEl.outerHTML : '<i class="fas fa-chevron-down"></i>';
            groupNameEl.innerHTML = `${iHtml} ${group.name} (${group.people.filter(p => p.matched && p.checked).length}/${group.people.filter(p => p.matched).length}人)`;
        }
        const groupCountEl = card.querySelector('.group-count');
        if (groupCountEl) {
            groupCountEl.textContent = `${group.people.filter(p => p.matched).length}人匹配`;
        }
    }
    
    updateReport();
}

function updateDateRangeDisplay() {
    const el = document.getElementById('dateRangeDisplay');
    if (state.dateRange && state.dateRange.start && state.dateRange.end) {
        el.innerHTML = '请假时间：<span class="highlight">' + state.dateRange.start + ' 至 ' + state.dateRange.end + '</span>';
        el.classList.add('show');
    } else {
        el.classList.remove('show');
    }
}

function updateReport() {
    let report = '';
    const reasonGroups = {};
    const leaveSchoolList = [];
    const leaveOutsideList = [];
    
    state.groups.forEach(group => {
        group.people.forEach(p => {
            if (!p.checked) return;
            
            if (group.leaveType === 'leaveSchool') {
                leaveSchoolList.push(p);
            } else if (group.leaveType === 'leaveOutside') {
                leaveOutsideList.push(p);
            } else {
                const reason = group.reason || '未分组';
                if (!reasonGroups[reason]) reasonGroups[reason] = [];
                reasonGroups[reason].push(p);
            }
        });
    });
    
    const orderedReasons = ['数分', '网安', '阿sir', '数实战', '网管', '分团委', '学生会', '学习', '合唱团', '运动会', '警乐团', '羽毛球', '篮球队', '辩论队', '备赛', '复习', '校督', '其他'];
    orderedReasons.forEach(reason => {
        if (reasonGroups[reason] && reasonGroups[reason].length > 0) {
            report += `${reason}：\n`;
            reasonGroups[reason].forEach(p => {
                report += p.matched ? `${p.name} ${p.info.dorm}-${p.info.bed}\n` : `${p.name}（未找到）\n`;
            });
            report += '\n';
        }
    });
    
    Object.keys(reasonGroups).forEach(reason => {
        if (orderedReasons.includes(reason)) return;
        report += `${reason}：\n`;
        reasonGroups[reason].forEach(p => {
            report += p.matched ? `${p.name} ${p.info.dorm}-${p.info.bed}\n` : `${p.name}（未找到）\n`;
        });
        report += '\n';
    });
    
    if (leaveSchoolList.length > 0) {
        report += `请假离校：\n`;
        leaveSchoolList.forEach(p => {
            report += p.matched ? `${p.name} ${p.info.dorm}-${p.info.bed}\n` : `${p.name}（未找到）\n`;
        });
        report += '\n';
    }
    
    if (leaveOutsideList.length > 0) {
        report += `请假外出：\n`;
        leaveOutsideList.forEach(p => {
            report += p.matched ? `${p.name} ${p.info.dorm}-${p.info.bed}\n` : `${p.name}（未找到）\n`;
        });
        report += '\n';
    }
    
    document.getElementById('reportContent').textContent = report || '（暂无勾选人员）';
}

function applyAll() {
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    if (mode === 'ocr-pipeline' || mode === 'text-pipeline') {
        confirmAndReturn();
        return;
    }
    
    const updates = {};
    let count = 0;
    
    state.groups.forEach(group => {
        group.people.forEach(p => {
            if (!p.checked) return;
            
            let reason = '';
            if (group.leaveType === 'leaveInside') {
                reason = group.reason || '其他';
            }
            
            updates[p.name] = {
                status: group.leaveType,
                reason: reason,
            };
            count++;
        });
    });
    
    if (count === 0) { showToast('请至少勾选一名人员'); return; }
    
    const dateRange = state.dateRange;
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    if (dateRange && dateRange.start && dateRange.end) {
        const startDate = new Date(dateRange.start);
        const endDate = new Date(dateRange.end);
        if (endDate < today) {
            const userConfirm = confirm('该假单已过期，确认应用？');
            if (!userConfirm) {
                return;
            }
        }
        if (startDate > today) {
            const userConfirm = confirm('该假单尚未生效（开始日期为 ' + dateRange.start + '），是否仍要提前应用？');
            if (!userConfirm) {
                return;
            }
        }
    }
    
    if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
    
    const pendingData = {
        dateRange: dateRange,
        records: updates
    };
    localStorage.setItem('pendingLeaveRecords', JSON.stringify(pendingData));
    showToast(`成功设置 ${count} 条假单`);
    
    setTimeout(() => {
        window.location.href = 'index.html';
    }, 1000);
}

function goBack() { 
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    if (mode === 'ocr-pipeline' || mode === 'text-pipeline') {
        goBackToUpload();
        return;
    }
    window.location.href = 'index.html'; 
}

function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

function setupCopyOnClick() {
    const elements = [
        { id: 'originalPreview', label: '原始文本' },
        { id: 'cleanedPreview', label: '清洗后文本' },
        { id: 'resultPreview', label: '识别结果' },
        { id: 'reportContent', label: '报告预览' }
    ];
    
    elements.forEach(({ id, label }) => {
        const el = document.getElementById(id);
        if (el) {
            el.classList.add('copyable');
            el.addEventListener('click', async () => {
                const text = el.textContent || '';
                try {
                    await navigator.clipboard.writeText(text);
                    showToast('已复制' + label);
                } catch (e) {
                    fallbackCopy(text);
                    showToast('已复制' + label);
                }
            });
        }
    });
}

function copyPromptText() {
    const text = '提取图片中人名并以空格间隔';
    if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => showToast('已复制')).catch(() => fallbackCopy(text));
    } else {
        fallbackCopy(text);
    }
}

function fallbackCopy(text) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    try { document.execCommand('copy'); showToast('已复制'); } catch (e) { showToast('复制失败'); }
    document.body.removeChild(textarea);
}
    </script>
