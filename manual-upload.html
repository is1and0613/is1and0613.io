<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手动输入假单</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/manual-upload.css">
</head>
<body>
  <!-- 全局加载遮罩 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner-large"></div>
    <div class="loading-text">正在加载宿舍数据...</div>
    <div class="loading-error" id="loadingError">
      <p>加载数据失败，请检查网络后刷新重试</p>
      <button onclick="location.reload()">刷新页面</button>
    </div>
  </div>

  <!-- 顶部导航 -->
  <div class="header">
    <div class="header-back" onclick="goBack()">
      <i class="fas fa-arrow-left"></i>
    </div>
    <h1>手动输入假单</h1>
  </div>

  <!-- 提示横幅 -->
  <div class="tip-banner">
    <div class="content">
      <p>建议先把假单丢给豆包让它</p>
      <p class="highlight">"提取图片中人名并以空格间隔"</p>
      <br>
      <p>开发者能力有限，内置的OCR烂得不行</p>
      <p>有好的ai就让我们把它用起来好吗！</p>
    </div>
    <button class="copy-btn" onclick="copyPromptText()">
      <i class="fas fa-clipboard"></i>复制提示文字
    </button>
  </div>

  <!-- 格式说明 -->
  <div class="format-guide">
    <div class="title">
      <i class="fas fa-magic"></i>
      支持自由输入，自动识别人名和事由
    </div>
    <div class="desc">
      系统会自动从文本中提取人名和关键词（数分/网安/阿sir/辩论队/备赛/请假离校等），支持混合格式：人名事由交替、事由在前扩散、标题分组等多种格式
    </div>
  </div>

  <!-- 输入区域 -->
  <div class="input-section">
    <div class="label">请粘贴人名列表</div>
    <textarea id="inputText" placeholder="例如：&#10;604-1何锐颖 数分&#10;604-2杨欣欣 数分&#10;605-1田宸菲 数分&#10;605-3秦小斐 辩论队&#10;&#10;或：&#10;数分 何锐颖 杨欣欣 田宸菲 辩论队 秦小斐"></textarea>
    <button class="parse-btn" onclick="parseInput()">
      <i class="fas fa-magic"></i>智能解析
    </button>
  </div>

  <!-- 清洗预览折叠面板 -->
  <div class="preview-section" id="previewSection">
    <div class="preview-header" onclick="togglePreview()">
      <div class="title">
        <i class="fas fa-chevron-down"></i>
        清洗预览（点击查看解析过程）
      </div>
    </div>
    <div class="preview-body">
      <div class="preview-step">
        <div class="step-title">1. 原始文本</div>
        <div class="step-content" id="originalPreview"></div>
      </div>
      <div class="preview-step">
        <div class="step-title">2. 清洗后文本（去除宿舍编号、班级前缀等）</div>
        <div class="step-content cleaned" id="cleanedPreview"></div>
      </div>
      <div class="preview-step">
        <div class="step-title">3. 识别结果</div>
        <div class="step-content" id="resultPreview"></div>
      </div>
    </div>
  </div>

  <!-- 结果预览 -->
  <div class="result-section" id="resultSection">
    <div class="result-header">
      <div class="title">解析到 <span class="count" id="groupCount">0</span> 组人员</div>
    </div>
    <div id="groupsContainer"></div>
    <div class="date-range-display" id="dateRangeDisplay"></div>
    <div class="report-preview">
      <div class="title">报告预览</div>
      <pre class="report-content" id="reportContent"></pre>
    </div>
  </div>

  <!-- 底部按钮 -->
  <div class="bottom-actions" id="bottomActions" style="display: none;">
    <button class="bottom-btn secondary" onclick="goBack()">取消</button>
    <button class="bottom-btn primary" onclick="applyAll()">
      <i class="fas fa-check"></i>应用所有假单
    </button>
  </div>

  <!-- 提示消息 -->
  <div class="toast" id="toast"></div>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/name-matcher.js"></script>
  <script src="assets/js/manual-upload.js"></script>
</body>
</html>
