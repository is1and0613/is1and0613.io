<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>上传假单</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- PDF解析 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- Word解析 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <!-- Excel解析 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        // 设置 PDF.js worker
        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #EAF0E2;
            font-size: 14px;
            line-height: 1.5;
            padding-bottom: 100px;
        }
        
        /* ===== 顶部导航栏 ===== */
        .header {
            background: #2C436F;
            color: white;
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-back {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .header-back:hover { background: rgba(255,255,255,0.2); }
        
        .header-back:active {
            background: rgba(255,255,255,0.3);
            transform: scale(0.92);
        }
        
        .header h1 {
            font-size: 17px;
            font-weight: 600;
            flex: 1;
        }
        
        /* ===== 提示横幅 ===== */
        .info-banner {
            background: #F9F6E5;
            border: 1px solid #F9F6E5;
            border-radius: 12px;
            margin: 12px 16px;
            padding: 16px;
        }
        
        .info-banner .title {
            color: #2C436F;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-banner .content {
            color: #492D22;
            font-size: 13px;
            line-height: 1.8;
        }
        
        .info-banner .content .highlight {
            color: #2C436F;
            font-weight: 600;
        }
        
        /* ===== 上传区域 ===== */
        .upload-area {
            background: white;
            margin: 16px;
            padding: 40px 20px;
            border-radius: 12px;
            border: 2px dashed #d9d9d9;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-area:hover {
            border-color: #2C436F;
            background: #EAF0E2;
        }
        
        .upload-area:active {
            transform: scale(0.98);
        }
        
        .upload-area i {
            font-size: 48px;
            color: #bfbfbf;
            margin-bottom: 16px;
        }
        
        .upload-area p {
            color: #666;
            font-size: 14px;
        }
        
        .upload-area .hint {
            color: #999;
            font-size: 12px;
            margin-top: 8px;
        }
        
        /* 图片上传 */
        .upload-area.image-upload {
            background: linear-gradient(135deg, #EAF0E2 0%, #f5f8f1 100%);
            border-color: #2C436F;
        }
        
        .upload-area.image-upload i { color: #2C436F; }
        
        /* 文档上传 */
        .upload-area.doc-upload {
            background: white;
            border-color: #d9d9d9;
            padding: 24px 20px;
            margin-top: 8px;
        }
        
        .upload-area.doc-upload i {
            font-size: 36px;
            color: #2C436F;
            margin-bottom: 12px;
        }
        
        .upload-area.doc-upload p {
            color: #666;
            font-size: 14px;
        }
        
        .upload-area.doc-upload .hint {
            color: #999;
            font-size: 12px;
            margin-top: 6px;
        }
        
        /* ===== 已选文件列表 ===== */
        .file-list {
            margin: -8px 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .file-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            border-radius: 8px;
            color: #52c41a;
            font-size: 13px;
        }
        
        .file-item i { color: #52c41a; }
        
        .file-item.error {
            background: #fff2f0;
            border-color: #ffccc7;
            color: #ff4d4f;
        }
        
        .file-item.error i { color: #ff4d4f; }
        
        /* ===== 粘贴文本区域 ===== */
        .paste-section {
            background: white;
            margin: 16px;
            padding: 20px;
            border-radius: 12px;
        }
        
        .paste-section .label {
            font-size: 14px;
            color: #333;
            margin-bottom: 12px;
            font-weight: 500;
        }
        
        .paste-section textarea {
            width: 100%;
            min-height: 200px;
            padding: 12px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            font-family: monospace;
            line-height: 1.6;
        }
        
        .paste-section textarea:focus {
            outline: none;
            border-color: #2C436F;
        }
        
        .paste-section .parse-btn {
            width: 100%;
            padding: 12px;
            background: #2C436F;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
            transition: all 0.3s;
        }
        
        .paste-section .parse-btn:hover {
            background: #1a2d4d;
        }
        
        .paste-section .parse-btn:active {
            background: #1a2d4d;
            transform: scale(0.96);
        }
        
        /* ===== 底部按钮 ===== */
        .bottom-actions {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e8e8e8;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }
        
        .bottom-btn {
            flex: 1;
            padding: 14px 0;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.3s;
        }
        
        .bottom-btn.primary {
            background: #2C436F;
            color: white;
        }
        
        .bottom-btn.primary:active { background: #1a2d4d; transform: scale(0.96); }
        
        .bottom-btn.secondary {
            background: #EAF0E2;
            color: #2C436F;
        }
        
        .bottom-btn.secondary:active { background: #d4e0cc; transform: scale(0.96); }
        
        /* ===== 提示消息 ===== */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2C436F;
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 3000;
            display: none;
            box-shadow: 0 4px 16px rgba(44, 67, 111, 0.3);
        }
        
        .toast.active { display: block; animation: toastIn 0.3s ease; }
        
        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, -40%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="header">
        <div class="header-back" onclick="goBack()">
            <i class="fas fa-arrow-left"></i>
        </div>
        <h1>上传假单</h1>
    </div>
    
    <!-- 提示横幅 -->
    <div class="info-banner">
        <div class="title">
            <i class="fas fa-info-circle" style="color: #2C436F;"></i>
            使用说明
        </div>
        <div class="content">
            <p><b>方式一：</b>拍照或从图库选择假单图片，AI 自动识别人名和事由</p>
            <p><b>方式二：</b>点击下方文档卡片，自动提取 <span class="highlight">PDF / Word / Excel / TXT</span> 中的文字</p>
            <p><b>方式三：</b>直接在文本框中粘贴人名列表</p>
            <p>所有内容将统一跳转至智能解析页面进行处理</p>
        </div>
    </div>
    
    <!-- 图片上传区域（AI OCR） -->
    <div class="upload-area image-upload" id="imageUploadArea" onclick="selectImage()">
        <i class="fas fa-camera"></i>
        <p>点击拍照或选择假单图片</p>
        <p class="hint">支持 .jpg / .jpeg / .png / .webp</p>
    </div>
    
    <input type="file" id="imageInput" accept="image/*" onchange="handleImage(this.files[0])">
    
    <!-- OCR 加载提示 -->
    <div id="ocrLoading" style="display:none; background:white; margin:0 16px 16px; padding:20px; border-radius:12px; text-align:center;">
        <div class="loading-spinner" style="width:24px; height:24px; border:3px solid rgba(44,67,111,0.1); border-top-color:#2C436F; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 12px;"></div>
        <p style="color:#666; font-size:14px;">AI 正在识别图片内容，请稍候...</p>
    </div>
    
    <!-- 文档上传区域 -->
    <div class="upload-area doc-upload" id="docUploadArea" onclick="selectDocs()">
        <i class="fas fa-file-alt"></i>
        <p>上传 PDF / Word / Excel / TXT 文件</p>
        <p class="hint">点击选择文件，自动提取文字</p>
    </div>
    
    <div id="docFileList" class="file-list"></div>
    <input type="file" id="docInput" accept=".pdf,.docx,.xlsx,.xls,.txt" multiple onchange="handleDocs(this.files)" style="display:none;">
    
    <!-- 粘贴文本区域 -->
    <div class="paste-section">
        <div class="label">或直接粘贴人名列表</div>
        <textarea id="pasteText" placeholder="例如：&#10;604-1何锐颖 数分&#10;604-2杨欣欣 数分&#10;605-1田宸菲 数分&#10;605-3秦小斐 辩论队&#10;&#10;或：&#10;数分 何锐颖 杨欣欣 田宸菲 辩论队 秦小斐"></textarea>
        <button class="parse-btn" onclick="continueToParse()">
            <i class="fas fa-magic"></i>解析并继续
        </button>
    </div>
    
    <!-- 底部按钮 -->
    <div class="bottom-actions">
        <button class="bottom-btn secondary" onclick="goBack()">取消</button>
        <button class="bottom-btn primary" onclick="continueToParse()">
            <i class="fas fa-arrow-right"></i>解析并继续
        </button>
    </div>
    
    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>
    
    <script>
// ============================================
// 图片上传（AI OCR）+ 文档解析 + 文本粘贴
// 统一跳转到 manual-upload.html?mode=text-pipeline
// ============================================

// 选择图片
function selectImage() {
    document.getElementById('imageInput').click();
}

// 处理图片 OCR
async function handleImage(file) {
    if (!file) return;
    
    const loading = document.getElementById('ocrLoading');
    const uploadArea = document.getElementById('imageUploadArea');
    
    loading.style.display = 'block';
    uploadArea.style.display = 'none';
    
    const formData = new FormData();
    formData.append('image', file);
    
    try {
        const response = await fetch('/api/ocr', {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        
        if (data.success) {
            showToast('识别成功，正在跳转...');
            window.location.href = 'manual-upload.html?text=' + encodeURIComponent(data.formattedText);
        } else {
            showToast(data.message || '识别失败');
            loading.style.display = 'none';
            uploadArea.style.display = 'block';
        }
    } catch (error) {
        console.error('OCR 请求失败:', error);
        showToast('网络错误，请稍后重试');
        loading.style.display = 'none';
        uploadArea.style.display = 'block';
    }
}

// 选择文档
function selectDocs() {
    document.getElementById('docInput').click();
}

// 根据文件类型分发解析
async function parseFileByType(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    
    if (ext === 'pdf') {
        const arrayBuffer = await file.arrayBuffer();
        return await parsePDF(arrayBuffer);
    }
    else if (ext === 'docx') {
        const arrayBuffer = await file.arrayBuffer();
        return await parseWord(arrayBuffer);
    }
    else if (ext === 'xlsx' || ext === 'xls') {
        const arrayBuffer = await file.arrayBuffer();
        return await parseExcel(arrayBuffer);
    }
    else if (ext === 'txt') {
        return await parseTXT(file);
    }
    throw new Error('不支持的格式');
}

// PDF 解析：提取文字
async function parsePDF(arrayBuffer) {
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let text = '';
    for (let i = 1; i <= Math.min(pdf.numPages, 5); i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(item => item.str).join(' ') + '\n';
    }
    return text;
}

// Word 解析（.docx）
async function parseWord(arrayBuffer) {
    const result = await mammoth.extractRawText({ arrayBuffer });
    return result.value;
}

// Excel 解析（提取所有单元格文本）
async function parseExcel(arrayBuffer) {
    const workbook = XLSX.read(arrayBuffer, { type: 'array' });
    let text = '';
    workbook.SheetNames.forEach(sheetName => {
        const sheet = workbook.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
        rows.forEach(row => {
            const line = row.filter(cell => cell != null).join(' ');
            if (line.trim()) text += line + '\n';
        });
    });
    return text;
}

// TXT 文本文件解析
async function parseTXT(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.onerror = (e) => reject(e);
        reader.readAsText(file, 'UTF-8');
    });
}

// 处理文档上传
async function handleDocs(files) {
    if (!files || files.length === 0) return;
    if (files.length > 9) {
        showToast('最多只能选择9个文件');
        return;
    }
    
    showToast(`正在解析 ${files.length} 个文件...`);
    const texts = [];
    const fileList = document.getElementById('docFileList');
    
    for (let i = 0; i < files.length; i++) {
        const file = files[i];
        try {
            const text = await parseFileByType(file);
            if (text && text.trim()) {
                texts.push(`/* ${file.name} */\n${text.trim()}`);
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `<i class="fas fa-check-circle"></i><span>${file.name}</span>`;
                fileList.appendChild(item);
            }
        } catch (e) {
            console.error(e);
            showToast(`${file.name} 解析失败，请转换格式后重试`);
            const item = document.createElement('div');
            item.className = 'file-item error';
            item.innerHTML = `<i class="fas fa-times-circle"></i><span>${file.name} 解析失败</span>`;
            fileList.appendChild(item);
        }
    }
    
    if (texts.length > 0) {
        const pasteText = document.getElementById('pasteText');
        const existing = pasteText.value.trim();
        const combined = existing ? existing + '\n\n' + texts.join('\n\n') : texts.join('\n\n');
        pasteText.value = combined;
        showToast(`已提取 ${texts.length} 个文件的内容`);
    } else {
        showToast('没有提取到有效文本');
    }
}

// 解析并继续：统一跳转到 manual-upload.html?mode=text-pipeline
function continueToParse() {
    const text = document.getElementById('pasteText').value.trim();
    if (!text) {
        showToast('请先上传文件或粘贴人名列表');
        return;
    }
    
    localStorage.setItem('ocrRawText', text);
    localStorage.setItem('ocrContext', JSON.stringify({
        timestamp: Date.now()
    }));
    
    window.location.href = 'manual-upload.html?mode=text-pipeline';
}

function goBack() {
    window.location.href = 'index.html';
}

function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('active');
    setTimeout(() => toast.classList.remove('active'), 2000);
}
    </script>
</body>
</html>
