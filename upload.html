<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>上传假单</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script>
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  </script>
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/upload.css">
</head>
<body>
  <!-- 顶部导航 -->
  <div class="header">
    <div class="header-back" onclick="goBack()">
      <i class="fas fa-arrow-left"></i>
    </div>
    <h1>上传假单</h1>
    <button class="neu-btn-header icon-only" id="btnTheme" onclick="toggleTheme()" title="切换日间/夜间模式">
      <i class="fas fa-moon"></i>
    </button>
  </div>

  <!-- 提示横幅 -->
  <div class="info-banner">
    <div class="title">
      <i class="fas fa-info-circle" style="color: var(--accent);"></i>
      使用说明
    </div>
    <div class="content">
      <p><b>方式一：</b>拍照或从图库选择假单图片，AI 自动识别人名和事由</p>
      <p><b>方式二：</b>点击下方文档卡片，自动提取 <span class="highlight">PDF / Word / Excel / TXT</span> 中的文字</p>
      <p>所有内容将统一跳转至智能解析页面进行处理</p>
    </div>
  </div>

  <!-- 手写假单警告 -->
  <div class="handwritten-warning">
    <i class="fas fa-exclamation-triangle"></i>
    手写假单识别准确率较低，建议核对后使用
  </div>

  <!-- 图片上传区域 -->
  <div class="upload-area image-upload" id="imageUploadArea" onclick="selectImage()">
    <div class="upload-empty" id="imageUploadEmpty">
      <i class="fas fa-images"></i>
      <p>点击批量选择假单图片（支持多张，最多20张）</p>
      <p class="hint">支持 .jpg / .jpeg / .png / .webp，或拖拽图片到此处</p>
    </div>
    <div class="image-grid" id="imageGrid"></div>
  </div>

  <input type="file" id="imageInput" multiple accept="image/*" onchange="handleImages(this.files)">

  <!-- OCR 加载提示 -->
  <div id="ocrLoading" class="ocr-loading-overlay">
    <div class="ocr-loading-content">
      <div class="loading-spinner"></div>
      <p class="loading-carousel-text" id="loadingCarouselText">kimi 识别文字中……</p>
    </div>
  </div>

  <!-- 文档上传区域 -->
  <div class="upload-area doc-upload" id="docUploadArea" onclick="selectDocs()">
    <i class="fas fa-file-alt"></i>
    <p>上传 PDF / Word / Excel / TXT 文件</p>
    <p class="hint">点击选择文件，或拖拽文件到此处</p>
  </div>

  <div class="doc-empty-state" id="docEmptyState">
    <i class="fas fa-cloud-upload-alt"></i>
    <p>暂无文件，点击上方区域或拖拽文件到此处</p>
  </div>

  <div id="docFileList" class="file-list" style="display:none;"></div>
  <input type="file" id="docInput" accept=".pdf,.docx,.xlsx,.xls,.txt" multiple onchange="handleDocs(this.files)">

  <textarea id="pasteText" style="display:none;"></textarea>

  <!-- 底部按钮 -->
  <div class="bottom-actions">
    <button class="bottom-btn secondary" onclick="goBack()">取消</button>
    <button class="bottom-btn primary" onclick="continueToParse()">
      <div class="btn-main"><i class="fas fa-arrow-right"></i>解析并继续</div>
    </button>
  </div>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/upload.js"></script>
</body>
</html>
